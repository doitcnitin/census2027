<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Census 2027 | Posting & Bank Details Collection Form
</title>

<meta
name="theme-color"
content="#138808">

<link
rel="stylesheet"
href="style.css">

</head>

  <body>

<div class="container">

<!-- HEADER -->

<div class="header">

<div class="logo-box">

<img
class="india-logo"
src="Logo_of_the_Census_of_India.jpg"
alt="Census Logo">

</div>

  <div id="loader">

  <div class="loader-box">

    <div class="spinner"></div>

    <div id="loaderText">
      Loading...
    </div>

  </div>

</div>

<!-- <h1>
Census 2027
</h1> -->

<p>
Posting & Bank Details Collection Form
</p>

</div>

<!-- ADMIN NOTE -->

<div class="admin-note">

⚠️ After final submission, modification is not permitted.
For any correction, please contact the Administrator.

</div>

<!-- CENSUS DETAILS -->

<div class="card">

<div class="card-title">

📋 Census Details

</div>

<label>
Census Post
</label>

<select id="censusPost">

<option value="">
Select
</option>

<option value="Supervisor">
Supervisor
</option>

<option value="Enumerator">
Enumerator
</option>

</select>

<label>
Circle Number
</label>

<select id="circleNo">

<option value="">
Loading...
</option>

</select>

<label>
Supervisor Name
</label>

<input
type="text"
id="supervisorName"
readonly>

<label>
Supervisor Mobile
</label>

<input
type="text"
id="supervisorMobile"
readonly>

<label>
HLB Number
</label>

<select id="hlbNo">

<option value="">
Select
</option>

</select>

<label>
Enumerator Name
</label>

<input
type="text"
id="enumeratorName"
readonly>

<label>
Mobile Number
</label>

<input
type="text"
id="mobileNumber"
readonly>

</div>

<!-- OFFICE DETAILS -->

<div class="card">

<div class="card-title">

🏢 Office Details

</div>

<label>
Designation
</label>

<input
type="text"
id="designation"
placeholder="Enter Your Designation"
  autocomplete="off">

<label>
Office Name
</label>

<input
type="text"
id="officeName"
  placeholder="Enter Your Office Name"
autocomplete="off">

<label>
Office Address
</label>

<textarea
id="officeAddress"
  placeholder="Enter Your Office Address"
rows="3"></textarea>

</div>

<!-- BANK DETAILS -->

<div class="card">

<div class="card-title">

🏦 Bank Details

</div>

<label>
IFSC Code
</label>

<input
type="text"
id="ifscCode"
  placeholder="Enter IFSC Code"
autocomplete="off">

<label>
Bank Name
</label>

<input
type="text"
id="bankName"
readonly>

<label>
Branch Name
</label>

<input
type="text"
id="branchName"
readonly>

<label>
Branch Address
</label>

<textarea
id="branchAddress"
rows="3"
readonly></textarea>

<label>
Account Number
</label>

<input
type="text"
id="accountNumber"
inputmode="numeric"
pattern="[0-9]*"
maxlength="20"
placeholder="Enter Account Number"
autocomplete="off">

</div>

<!-- DECLARATIONS -->

<div class="card">

<div class="card-title">

📝 Declaration

</div>

<label class="consent-label">

<input
type="checkbox"
id="consent1">

<span>

I hereby certify that the information provided by me is true and correct.

</span>

</label>

<label class="consent-label">

<input
type="checkbox"
id="consent2">

<span>

I confirm that the bank account details entered above belong to me and are correct.

</span>

</label>

</div>

<!-- FOOTER SPACE -->

<div style="height:20px"></div>

</div>


    <!-- FIXED ACTION BAR -->

<!-- FIXED ACTION BAR -->

<div class="button-row">

<button
id="saveBtn"
type="button"
class="save-btn">

💾 Save Details

</button>

<button
id="clearBtn"
type="button"
class="clear-btn">

🔄 Clear Form

</button>

</div>

<div class="developer-credit">

Designed & Developed by

<span>
Nitin Raj Sethi
</span>

<small>
DoIT&C
</small>

</div>

</div> <!-- container ends here -->
<!-- TOAST -->

<div id="toast"></div>

<script src="app.js?v=999"></script>
</body>
</html>
